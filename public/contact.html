<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Nancy</title>
    <style>
      :root {
        --blue: #94a7ab;
        --wine: rgb(192, 85, 118);
        --text: #2d2d2d;
        --muted: #6b6560;
        --border: #e8e4df;
        --success: #3f7d4e;
        --error: #b33a3a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background: linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)), url("./images/hero-meditation.jpg") center/cover no-repeat fixed;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }

      .card {
        width: 100%;
        max-width: 760px;
        background: rgba(255,255,255,0.9);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      }

      h1 {
        margin: 0 0 10px;
        color: var(--wine);
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        font-weight: 600;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      form {
        display: grid;
        gap: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      label {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 6px;
        color: var(--text);
      }

      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        font: inherit;
        background: white;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      button {
        appearance: none;
        border: none;
        background: var(--wine);
        color: white;
        border-radius: 10px;
        padding: 14px 20px;
        font: inherit;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover { opacity: 0.92; }
      button:disabled { opacity: 0.65; cursor: wait; }

      .note {
        margin-top: 14px;
        font-size: 0.92rem;
      }

      .status {
        margin-top: 8px;
        font-size: 0.95rem;
        min-height: 1.4em;
      }

      .status.success { color: var(--success); }
      .status.error { color: var(--error); }

      .back {
        display: inline-block;
        margin-bottom: 18px;
        color: var(--wine);
        text-decoration: none;
      }

      @media (max-width: 640px) {
        .card { padding: 22px; }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <a class="back" href="./">&larr; Back to website</a>
        <h1>Contact Nancy</h1>
        <p>Fill out the form below and send your message directly from this page.</p>

        <form id="contactForm">
          <input type="hidden" name="access_key" value="b8be152e-0fa4-411b-a5bf-6fdc5de731f4" />
          <input type="hidden" name="subject" value="New website contact for Nancy" />
          <input type="hidden" name="from_name" value="nancyjamello.com" />

          <div class="row">
            <div>
              <label for="firstName">First name</label>
              <input id="firstName" name="first_name" type="text" required />
            </div>
            <div>
              <label for="lastName">Last name</label>
              <input id="lastName" name="last_name" type="text" required />
            </div>
          </div>

          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <button id="submitButton" type="submit">Send</button>
          <div id="status" class="status" aria-live="polite"></div>
        </form>

        <p class="note">Messages sent here will be delivered to Nancy at nancyjamello@gmail.com.</p>
      </div>
    </div>

    <script>
      const form = document.getElementById('contactForm');
      const status = document.getElementById('status');
      const submitButton = document.getElementById('submitButton');

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        status.textContent = 'Sending...';
        status.className = 'status';
        submitButton.disabled = true;

        try {
          const formData = new FormData(form);
          const response = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: formData,
          });

          const result = await response.json();

          if (result.success) {
            status.textContent = 'Your message was sent successfully.';
            status.className = 'status success';
            form.reset();
          } else {
            status.textContent = 'Sorry, something went wrong. Please try again.';
            status.className = 'status error';
          }
        } catch (error) {
          status.textContent = 'Sorry, something went wrong. Please try again.';
          status.className = 'status error';
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
